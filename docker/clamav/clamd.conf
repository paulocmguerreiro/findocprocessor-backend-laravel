# clamd.conf — FinDocProcessor (#111)
#
# Montado em /etc/clamav/clamd.conf no serviço `clamav` (imagem clamav/clamav-debian).
# O objectivo desta configuração própria é subir os limites de tamanho do scan para
# **acima do limite de upload de 50 MB** (RF-15) — os defaults do clamd (StreamMaxLength
# 25M) fariam o scan `INSTREAM` rejeitar ficheiros grandes que a aplicação aceita.
#
# Mantém os essenciais para o container: escuta TCP em 3310 (a app liga por
# CLAMAV_HOST:CLAMAV_PORT), em foreground, com a base de assinaturas em /var/lib/clamav.

DatabaseDirectory /var/lib/clamav
TemporaryDirectory /tmp
LogTime yes
Foreground yes

# Socket TCP acessível na rede interna do compose (o serviço não expõe portas ao host).
TCPSocket 3310
TCPAddr 0.0.0.0

MaxThreads 4

# Limites alinhados com o upload de 50 MB, com margem (RF-15 / 04-infra/malware.md).
StreamMaxLength 64M
MaxScanSize 100M
MaxFileSize 64M
