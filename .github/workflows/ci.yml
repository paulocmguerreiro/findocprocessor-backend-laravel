name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: findocprocessor_testing
          MYSQL_USER: findoc
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -usecret || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências de sistema (OCR/rasterização — #95/#96)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ghostscript tesseract-ocr tesseract-ocr-por tesseract-ocr-eng redis-tools

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_mysql, redis, imagick
          coverage: xdebug

      - name: Create bootstrap/cache
        run: mkdir -p bootstrap/cache

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Setup MySQL grants (paralelo)
        run: |
          mysql -h 127.0.0.1 -uroot -psecret -e \
            "GRANT ALL PRIVILEGES ON *.* TO 'findoc'@'%'; FLUSH PRIVILEGES;"

      - name: Flush Redis (evita cache de modelos serializados de runs anteriores)
        run: redis-cli -h 127.0.0.1 -p 6379 FLUSHALL

      - name: Quality pipeline
        run: composer test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: findocprocessor_testing
          DB_USERNAME: findoc
          DB_PASSWORD: secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # Paridade de ambiente: valida que a imagem constrói e que a app arranca.
  # A suite completa corre em build-and-test contra MySQL real.
  docker-parity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and boot stack
        run: docker compose up -d --build

      - name: Verificar arranque da app
        run: |
          timeout 150 bash -c \
            'until docker compose exec -T app php artisan about --only=Environment > /dev/null 2>&1; \
             do sleep 3; done'

      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
