name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, redis
          coverage: xdebug

      - name: Create bootstrap/cache
        run: mkdir -p bootstrap/cache

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Quality pipeline
        run: composer test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # Paridade de ambiente: valida que a imagem constrói e que a app arranca e
  # corre as migrations contra MySQL real. NÃO corre a suite (essa fica em
  # `build-and-test` em sqlite, e `composer test:mysql` localmente).
  docker-parity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and boot stack
        run: docker compose up -d --build

      - name: Verificar migrations contra MySQL (app arranca e liga ao MySQL)
        run: |
          timeout 150 bash -c 'until docker compose exec -T app php artisan migrate:status > /dev/null 2>&1; do sleep 3; done'
          docker compose exec -T app php artisan migrate:status

      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
