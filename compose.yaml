# FinDocProcessor — stack de desenvolvimento/demonstração.
#
#   docker compose up -d --build
#   docker compose exec app composer test      # correr a pipeline de qualidade
#   API:   http://localhost:8000
#   Login: admin@findocprocessor.test / password   (token dev: "dev-token")
#
# Notas:
# - O código é montado por bind mount (edição em tempo real); o vendor/ usa um
#   volume anónimo populado pela imagem, pelo que o vendor do host é irrelevante.
# - Após mudar dependências (composer.json) ou o Dockerfile:
#   `docker compose down -v && docker compose up -d --build`.

x-app-env: &app-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:8000
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: findocprocessor
  DB_USERNAME: findoc
  DB_PASSWORD: secret
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: "6379"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: findocprocessor-app
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "true"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [findoc]

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [findoc]

  queue:
    image: findocprocessor-app
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      <<: *app-env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [findoc]

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: findocprocessor
      MYSQL_USER: findoc
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/10-testing-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [findoc]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks: [findoc]

networks:
  findoc:
    driver: bridge

volumes:
  mysql-data:
