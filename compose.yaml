# FinDocProcessor — stack de desenvolvimento/demonstração.
#
#   docker compose up -d --build
#   docker compose exec app composer test      # correr a pipeline de qualidade
#   API:   http://localhost:8000
#   Login: admin@findocprocessor.test / password   (token dev: "dev-token")
#
# Notas:
# - O código é montado por bind mount (edição em tempo real); o vendor/ usa um
#   volume anónimo populado pela imagem, pelo que o vendor do host é irrelevante.
# - Após mudar dependências (composer.json) ou o Dockerfile:
#   `docker compose down -v && docker compose up -d --build`.

x-app-env: &app-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:8000
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: findocprocessor
  DB_USERNAME: findoc
  DB_PASSWORD: secret
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  # LLM local no HOST (fora da rede findoc): os containers alcançam-no por
  # host.docker.internal (ver extra_hosts nos serviços app/queue/scheduler).
  # No host, o Ollama tem de ouvir em 0.0.0.0 — `OLLAMA_HOST=0.0.0.0 ollama serve`.
  # Ex.: LLM_LOCAL_URL=http://host.docker.internal:11434 LLM_LOCAL_MODEL=qwen2.5:7b-instruct docker compose up
  LLM_LOCAL_PROVIDER: ${LLM_LOCAL_PROVIDER:-ollama}
  LLM_LOCAL_URL: ${LLM_LOCAL_URL:-}
  LLM_LOCAL_MODEL: ${LLM_LOCAL_MODEL:-}
  LLM_TIMEOUT_SEGUNDOS: ${LLM_TIMEOUT_SEGUNDOS:-180}
  LLM_CLOUD_URL: ${LLM_CLOUD_URL:-}
  LLM_CLOUD_MODEL: ${LLM_CLOUD_MODEL:-}
  LLM_CLOUD_KEY: ${LLM_CLOUD_KEY:-}
  CLAMAV_HOST: clamav
  CLAMAV_PORT: "3310"

# Mapeia host.docker.internal -> host (necessário em Linux; no Docker Desktop já
# resolve). Permite aos containers alcançar o Ollama a correr no host.
x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: findocprocessor-app
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "true"
    extra_hosts: *extra-hosts
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      mysql-grants:
        condition: service_completed_successfully
      redis:
        condition: service_started
      clamav:
        condition: service_healthy
    networks: [findoc]

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [findoc]

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: findocprocessor-app
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      <<: *app-env
    extra_hosts: *extra-hosts
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      mysql-grants:
        condition: service_completed_successfully
      redis:
        condition: service_started
      clamav:
        condition: service_healthy
    networks: [findoc]

  # Agendador (#111): corre o Schedule (routes/console.php) que dispara os comandos
  # extracao:* do pipeline. Partilha a imagem/env da app; não corre migrations
  # (RUN_MIGRATIONS ausente — o serviço `app` já as aplicou).
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: findocprocessor-app
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      <<: *app-env
    extra_hosts: *extra-hosts
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      mysql-grants:
        condition: service_completed_successfully
      redis:
        condition: service_started
      clamav:
        condition: service_healthy
    networks: [findoc]

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: findocprocessor
      MYSQL_USER: findoc
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/10-testing-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [findoc]

  # Serviço one-shot: aplica GRANT ALL em cada 'docker compose up', incluindo volumes
  # pré-existentes onde o init.sql não volta a correr. Necessário para que findoc
  # possa criar/eliminar findocprocessor_testing_test_N nos testes paralelos.
  # Usa entrypoint directo para mysql (bypass do docker-entrypoint.sh do MySQL).
  # restart: "no" garante que não reinicia após completar.
  mysql-grants:
    image: mysql:8.4
    restart: "no"
    entrypoint: ["mysql"]
    command:
      - "-hmysql"
      - "-uroot"
      - "-proot"
      - "-e"
      - "GRANT ALL PRIVILEGES ON *.* TO 'findoc'@'%'; FLUSH PRIVILEGES;"
    depends_on:
      mysql:
        condition: service_healthy
    networks: [findoc]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [findoc]

  # Scan de malware (issue #91) — só acessível na rede interna (sem `ports:`).
  # freshclam corre embutido na imagem oficial (autoupdate das assinaturas,
  # sem intervenção da app). Arranque lento (minutos, carrega assinaturas em
  # RAM) — start_period generoso no healthcheck evita falsos negativos.
  clamav:
    image: clamav/clamav-debian:1.4
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
      # clamd.conf próprio: limites de scan ≥ 50 MB (StreamMaxLength/MaxScanSize/MaxFileSize)
      # para acompanhar o limite de upload de 50 MB (#111, RF-15).
      - ./docker/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks: [findoc]

networks:
  findoc:
    driver: bridge

volumes:
  mysql-data:
  clamav-data:
