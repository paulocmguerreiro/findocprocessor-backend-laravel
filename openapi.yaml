        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'

  /documentos:
    get:
      summary: Listar documentos (cursor pagination)
      tags: [Documento]
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            maximum: 100
            default: 15
        - in: query
          name: sort
          schema:
            type: string
            enum: [data_documento, created_at]
        - in: query
          name: direction
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: estado
          schema:
            $ref: '#/components/schemas/EstadoDocumento'
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Documento'
                  links:
                    type: object
                    properties:
                      prev:
                        type: ['string', 'null']
                      next:
                        type: ['string', 'null']
                  meta:
                    type: object
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'

    post:
      summary: Registar documento manual (JSON)
      tags: [Documento]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_fornecedor, id_cliente, id_categoria, valor, data_documento, ficheiro]
              properties:
                id_fornecedor:
                  type: string
                  format: uuid
                id_cliente:
                  type: string
                  format: uuid
                id_categoria:
                  type: string
                  format: uuid
                valor:
                  type: number
                  minimum: 0
                data_documento:
                  type: string
                  format: date
      responses:
        '201':
          description: Documento registado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Documento'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '422':
          $ref: '#/components/schemas/ErrorValidacao'

  /documentos/upload:
    post:
      summary: Receber upload de documento (multipart/form-data)
      tags: [Documento]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [ficheiro, id_fornecedor, id_cliente, id_categoria, valor, data_documento]
              properties:
                ficheiro:
                  type: string
                  format: binary
                id_fornecedor:
                  type: string
                  format: uuid
                id_cliente:
                  type: string
                  format: uuid
                id_categoria:
                  type: string
                  format: uuid
                valor:
                  type: number
                  minimum: 0
                data_documento:
                  type: string
                  format: date
      responses:
        '201':
          description: Upload recebido; documento em PENDENTE
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Documento'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '422':
          $ref: '#/components/schemas/ErrorValidacao'

  /documentos/{documento}:
    parameters:
      - in: path
        name: documento
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Ver documento
      tags: [Documento]
      parameters:
        - in: query
          name: include
          schema:
            type: string
            enum: [historico]
      responses:
        '200':
          description: Documento encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Documento'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'

    patch:
      summary: Corrigir documento (Processado → Processado)
      tags: [Documento]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_fornecedor, id_cliente, id_categoria, valor, data_documento]
              properties:
                id_fornecedor:
                  type: string
                  format: uuid
                id_cliente:
                  type: string
                  format: uuid
                id_categoria:
                  type: string
                  format: uuid
                valor:
                  type: number
                  minimum: 0
                data_documento:
                  type: string
                  format: date
      responses:
        '200':
          description: Documento corrigido
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Documento'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          $ref: '#/components/schemas/ErrorValidacao'

    delete:
      summary: Eliminar documento (qualquer estado)
      tags: [Documento]
      responses:
        '204':
          description: Eliminado com sucesso
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'

  /documentos/{documento}/reprocessar:
    post:
      summary: Reprocessar documento (Erro → AguardaEnvio)
      tags: [Documento]
      parameters:
        - in: path
          name: documento
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modo]
              properties:
                modo:
                  type: string
                  enum: [MODELO, FERRAMENTA]
      responses:
        '200':
          description: Documento reaberto para reprocessamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Documento'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          description: Transição inválida ou dados em falta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorTransicaoInvalida'

  /documentos/{documento}/ficheiro:
    get:
      summary: Descarregar ficheiro do documento
      tags: [Documento]
      parameters:
        - in: path
          name: documento
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stream do ficheiro
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'

  /utilizadores:
    get:
      summary: Listar utilizadores (cursor pagination)
      tags: [Utilizador]
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            maximum: 100
            default: 15
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, email, created_at]
            default: name
        - in: query
          name: direction
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - in: query
          name: estado
          schema:
            $ref: '#/components/schemas/FiltroEstadoRegisto'
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Utilizador'
                  links:
                    type: object
                    properties:
                      prev:
                        type: ['string', 'null']
                      next:
                        type: ['string', 'null']
                  meta:
                    type: object
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'

    post:
      summary: Criar utilizador
      tags: [Utilizador]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  description: "Mínimo 8 caracteres, maiúsculas e minúsculas, números e símbolos"
                password_confirmation:
                  type: string
                role:
                  type: string
                  nullable: true
                  description: "Nome de um role existente (opcional)"
      responses:
        '201':
          description: Utilizador criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Utilizador'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '422':
          $ref: '#/components/schemas/ErrorValidacao'

  /utilizadores/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Ver utilizador (inclui inactivos; o próprio é sempre permitido)
      tags: [Utilizador]
      responses:
        '200':
          description: Utilizador encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Utilizador'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'

    put:
      summary: Actualizar utilizador (inclui inactivos)
      tags: [Utilizador]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  nullable: true
                  description: "Opcional; se omitido a password não é alterada"
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Utilizador actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Utilizador'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          $ref: '#/components/schemas/ErrorValidacao'

    delete:
      summary: Eliminar utilizador (hard delete sem referências; soft delete se referenciado)
      tags: [Utilizador]
      responses:
        '204':
          description: Eliminado com sucesso (tokens revogados)
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          description: Auto-eliminação não permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidacao'

  /utilizadores/{id}/role:
    put:
      summary: Atribuir role a um utilizador
      tags: [Utilizador]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
      responses:
        '204':
          description: Role atribuído com sucesso
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          $ref: '#/components/schemas/ErrorValidacao'

  /utilizadores/{id}/restaurar:
    patch:
      summary: Restaurar utilizador soft-deleted
      description: >
        Reactiva um utilizador soft-deleted. Requer a permissão
        `utilizadores.eliminar`. Falha com 422 se o utilizador não estava
        inactivo ou se está anonimizado (email `anonimizado+...`).
      tags: [Utilizador]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Utilizador reactivado (deleted_at a null)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Utilizador'
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          description: Utilizador não estava inactivo, ou está anonimizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidacao'

  /utilizadores/{id}/anonimizar:
    post:
      summary: Anonimizar utilizador (RGPD Art. 17.º)
      description: >
        Operação irreversível: substitui os dados pessoais (`name`, `email`,
        `password`, `remember_token`, `email_verified_at`) por valores
        não-identificativos, revoga os tokens Sanctum e faz soft delete, numa
        única transação. Requer a permissão `utilizadores.anonimizar`. Falha com
        422 na auto-anonimização ou se o utilizador já está anonimizado.
      tags: [Utilizador]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Utilizador anonimizado (dados substituídos, soft-deleted, tokens revogados)
        '401':
          $ref: '#/components/schemas/ErrorNaoAutenticado'
        '403':
          $ref: '#/components/schemas/ErrorSemPermissao'
        '404':
          $ref: '#/components/schemas/ErrorNaoEncontrado'
        '422':
          description: Auto-anonimização não permitida, ou utilizador já anonimizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidacao'
